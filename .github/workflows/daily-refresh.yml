name: Daily Dashboard Refresh (8AM HKT)

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 08:00 HKT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install openai requests
          fi

      - name: Run data update script
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          echo "Running update_data.py at $(TZ='Asia/Hong_Kong' date '+%Y-%m-%d %H:%M:%S HKT')"
          python update_data.py
          echo "Finished update_data.py"

      - name: Show changed files
        run: |
          echo "Changed files after script run:"
          git status --short

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Daily refresh $(TZ='Asia/Hong_Kong' date '+%Y-%m-%d %H:%M HKT')"
            git push
          fi
