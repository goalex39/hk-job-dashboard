name: Daily Dashboard Refresh (8AM HKT)

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 08:00 HKT
  workflow_dispatch:

concurrency:
  group: daily-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install openai requests
          fi

      - name: Run data update script
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          echo "Running update_data.py at $(TZ='Asia/Hong_Kong' date '+%Y-%m-%d %H:%M:%S HKT')"
          python update_data.py
          echo "Finished update_data.py"

      - name: Show changed files
        run: |
          echo "Changed files after script run:"
          git status --short

      - name: Commit and push
        run: |
          DATE=$(TZ="Asia/Hong_Kong" date +"%Y-%m-%d %H:%M HKT")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "🔄 Daily refresh $DATE"
          git pull --rebase origin main
          git push
